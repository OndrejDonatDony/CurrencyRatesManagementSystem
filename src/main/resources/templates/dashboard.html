<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title th:text="#{title} + ' - ' + #{dashboard}">
        Správa měnových kurzů - Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<nav>
    <a th:href="@{/dashboard}" th:text="#{dashboard}">Dashboard</a>
    <a th:href="@{/settings}" th:text="#{settings}">Settings</a>

    <span class="right">
        <a th:href="@{/dashboard(lang='cs')}">CZ</a>
        |
        <a th:href="@{/dashboard(lang='en')}">EN</a>
    </span>
</nav>

<h1 th:text="#{dashboard}">Dashboard</h1>

<p th:if="${error}" th:text="${error}" class="error"></p>

<form th:action="@{/dashboard}" method="post">

    <div>
        <label th:text="#{baseCurrency}">Base měna</label>
        <input type="text" name="base" th:value="${base}" placeholder="EUR">
    </div>

    <div>
        <label th:text="#{selectedCurrencies}">Měny</label>
        <input type="text" name="symbols" th:value="${symbols}" placeholder="USD,CZK,GBP">
    </div>

    <div>
        <label th:text="#{startDate}">Začátek období</label>
        <input type="date" name="startDate" th:value="${startDate}">
    </div>

    <div>
        <label th:text="#{endDate}">Konec období</label>
        <input type="date" name="endDate" th:value="${endDate}">
    </div>

    <button type="submit" th:text="#{loadData}">
        Načíst data
    </button>

</form>

<div th:if="${latest != null}">

    <h2 th:text="#{latestRates}">Aktuální kurzy</h2>

    <p>
        <strong th:text="#{baseCurrency}">
            Base
        </strong>:
        <span th:text="${latest.base}"></span>
    </p>

    <p>
        <strong th:text="#{date}">
            Date
        </strong>:
        <span th:text="${latest.date}"></span>
    </p>

    <p>
        <strong th:text="#{rates}">
            Rates
        </strong>:
        <span th:text="${latest.rates}"></span>
    </p>

</div>

<div th:if="${analysis != null}">

    <h2 th:text="#{analysis}">Analýza</h2>

    <p>
        <strong th:text="#{strongestCurrency}">
            Nejsilnější měna
        </strong>:
        <span th:text="${analysis.strongestCurrency}"></span>
        (
        <span th:text="${analysis.strongestValue}"></span>
        )
    </p>

    <p>
        <strong th:text="#{weakestCurrency}">
            Nejslabší měna
        </strong>:
        <span th:text="${analysis.weakestCurrency}"></span>
        (
        <span th:text="${analysis.weakestValue}"></span>
        )
    </p>

</div>

<div th:if="${average != null}">

    <h2 th:text="#{averageRates}">Průměrné kurzy</h2>

    <p th:text="${average.averageRates}"></p>

</div>

<form th:action="@{/logout}" method="post">
    <button type="submit" th:text="#{logout}">
        Odhlásit
    </button>
</form>

</body>
</html>
