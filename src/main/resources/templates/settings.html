<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <title th:text="#{title} + ' - ' + #{settings}">
        Správa měnových kurzů - Nastavení
    </title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <a th:href="@{/dashboard}" th:text="#{dashboard}">Dashboard</a>
    <a th:href="@{/settings}" th:text="#{settings}">Nastavení</a>

    <span class="right">
        <a th:href="@{/settings(lang='cs')}">CZ</a>
        |
        <a th:href="@{/settings(lang='en')}">EN</a>
    </span>
</nav>

<h1 th:text="#{settings}">Nastavení</h1>
<p th:if="${error}" th:text="${error}" class="error"></p>
<p th:if="${success}" th:text="${success}"></p>

<form th:action="@{/settings}" method="post">

    <div>
        <label th:text="#{baseCurrency}">Základní měna</label>
        <input type="text" name="baseCurrency"
               th:value="${settings != null ? settings.baseCurrency : 'EUR'}">
    </div>

    <div>
        <label th:text="#{selectedCurrencies}">Vybrané měny</label>
        <input type="text" name="selectedCurrencies"
               th:value="${settings != null ? settings.selectedCurrencies : 'USD,CZK,GBP'}">
    </div>

    <button type="submit" th:text="#{save}">Uložit</button>

</form>

</body>
</html>
